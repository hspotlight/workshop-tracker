<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Workshop Tracker - Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="app-header">
    <span class="logo">Workshop Tracker</span>
    <div class="header-right">
      <span id="user-email"></span>
      <button id="theme-toggle-btn" class="theme-toggle" title="Toggle theme">☀️</button>
      <button id="logout-btn" class="btn btn-small">Logout</button>
    </div>
  </header>

  <main class="dashboard-main">
    <div class="dashboard-header">
      <h1>My Sessions</h1>
      <button id="create-session-btn" class="btn btn-primary">+ New Session</button>
    </div>

    <div id="error-message" class="error-message" style="display: none;"></div>

    <!-- Create session modal -->
    <div id="create-modal" class="modal" style="display: none;">
      <div class="modal-content">
        <h2>Create New Session</h2>
        <form id="create-form">
          <label for="session-name">Session Name</label>
          <input type="text" id="session-name" placeholder="e.g. AWS Workshop June 2026" required />

          <label>Steps</label>
          <div id="steps-container">
            <div class="step-input-row">
              <input type="text" class="step-input" placeholder="Step 1 name" required />
              <textarea class="step-desc-input" placeholder="Step description (optional)" rows="2"></textarea>
            </div>
          </div>
          <button type="button" id="add-step-btn" class="btn btn-small">+ Add Step</button>

          <div class="modal-actions">
            <button type="button" id="cancel-create-btn" class="btn btn-small">Cancel</button>
            <button type="submit" class="btn btn-primary">Create Session</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Delete confirm modal -->
    <div id="confirm-delete-modal" class="modal" style="display: none;">
      <div class="modal-content">
        <h2>Delete Session</h2>
        <p style="margin-top: 12px; color: var(--color-text-muted); font-size: 14px;">
          Delete "<strong id="confirm-delete-name"></strong>"? This cannot be undone.
        </p>
        <div class="modal-actions">
          <button type="button" id="cancel-delete-btn" class="btn btn-small">Cancel</button>
          <button type="button" id="confirm-delete-btn" class="btn btn-small btn-danger">Delete</button>
        </div>
      </div>
    </div>

    <!-- Sessions list -->
    <div id="sessions-list" class="sessions-list">
      <p class="loading">Loading sessions...</p>
    </div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="utils.js"></script>
  <script src="theme.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
